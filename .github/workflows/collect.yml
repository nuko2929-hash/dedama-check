name: collect-minrepo

# min-repo から全店舗の出玉データを定期収集し、data/reports.json を更新する。
# 画面(GitHub Pages)はこの JSON を読んで表示する。

on:
  schedule:
    - cron: "0 2 * * *"    # 毎日 11:00 JST(前日分の出玉が出揃った頃)
    - cron: "0 8 * * *"    # 毎日 17:00 JST(朝が一時ブロックでも夕方で拾う)
    - cron: "30 12 * * *"  # 毎日 21:30 JST(晒し屋の翌日お品書きが出揃う頃→明日のおすすめ更新)
  workflow_dispatch:        # 手動実行(予想の収集日数を指定可。バックフィルは 30 等)
    inputs:
      predict_days:
        description: "晒し屋予想を何日さかのぼるか"
        required: false
        default: "4"

permissions:
  contents: write           # data/reports.json をコミットするため

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install deps
        run: pip install beautifulsoup4

      - name: run collector (min-repo 出玉)
        run: python collector/run.py 3

      - name: run predictor (晒し屋X予想)
        env:
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PREDICT_DAYS: ${{ github.event.inputs.predict_days || '4' }}
        run: python collector/predict.py

      - name: commit data
        run: |
          git config user.name  "dedama-bot"
          git config user.email "dedama-bot@users.noreply.github.com"
          git add data/reports.json data/predictions.json data/_seen_tweets.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "auto: update reports/predictions ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
