const DAYS_JP = ["日","月","火","水","木","金","土"];
const SHOPS_KEY="nori-cal-shops-v2", MEMOS_KEY="nori-cal-memos-v1", ANALYSIS_KEY="nori-cal-analysis-v1";

const storage = {

  "湘南台・他":{ bg:"bg-purple-500/10", border:"border-purple-500/25", badge:"bg-purple-500/20 text-purple-300" },

const AREAS = Object.keys(AREA_STYLES);

const DEFAULT_SHOPS = [
  { id:"s1", name:"楽園立川店", area:"立川", digitDays:[5], zorome:true, monthDayZorome:true, specificDays:[], saturday:false, anniversary:{month:8,day:7}, url:"https://www.p-world.co.jp/sp/hall.cgi?dir=tokyo&file=rakuen-tachikawa" },

  { id:"s3", name:"プレゴ立川店", area:"立川", digitDays:[5], zorome:false, monthDayZorome:false, specificDays:[], saturday:false, anniversary:null, url:"https://www.p-world.co.jp/tokyo/p-port-tachikawa.htm" },
  { id:"s4", name:"スーパーDステーション立川", area:"立川", digitDays:[3,9], zorome:false, monthDayZorome:false, specificDays:[], saturday:false, anniversary:null, url:null },
  { id:"s5", name:"キコーナ戸塚", area:"戸塚", digitDays:[3,9], zorome:false, monthDayZorome:false, specificDays:[], saturday:true, anniversary:{month:7,day:10}, url:"https://www.p-world.co.jp/kanagawa/kicona-totsuka.htm" },

  { id:"s8", name:"スクランブル田谷", area:"戸塚", digitDays:[6], zorome:false, monthDayZorome:false, specificDays:[25], saturday:false, anniversary:null, url:null },

  { id:"s12", name:"相模大野UNO", area:"相模大野", digitDays:[1], zorome:false, monthDayZorome:false, specificDays:[], saturday:false, anniversary:{month:9,day:13}, url:"https://www.p-world.co.jp/kanagawa/1060uno.htm" },
  { id:"s13", name:"アビバ湘南台", area:"湘南台・他", digitDays:[1,7], zorome:false, monthDayZorome:false, specificDays:[], saturday:false, anniversary:{month:12,day:27}, url:"https://www.p-world.co.jp/kanagawa/aviva-shonandai.htm" },
  { id:"s14", name:"クリエ湘南台", area:"湘南台・他", digitDays:[3,8], zorome:false, monthDayZorome:false, specificDays:[], saturday:false, anniversary:null, url:"https://www.p-world.co.jp/kanagawa/creer-shonandai.htm" },
  { id:"s15", name:"パラッツォ湘南台", area:"湘南台・他", digitDays:[2,6,8], zorome:false, monthDayZorome:false, specificDays:[], saturday:false, anniversary:{month:4,day:27}, url:"https://www.p-world.co.jp/kanagawa/palazzo-shonandai.htm" },
  { id:"s16", name:"マルハン綾瀬", area:"湘南台・他", digitDays:[7], zorome:false, monthDayZorome:false, specificDays:[], saturday:false, anniversary:null, url:"https://www.p-world.co.jp/kanagawa/maruhan-ayase-k.htm" },
  { id:"s17", name:"グランドホール長後", area:"湘南台・他", digitDays:[3,6], zorome:false, monthDayZorome:false, specificDays:[], saturday:false, anniversary:{month:4,day:26}, url:null },
];

function getReasons(shop, date) {
  const r=[], d=date.getDate(), m=date.getMonth()+1, dow=date.getDay();
  shop.digitDays.forEach(dig => { if(String(d).includes(String(dig))) r.push(`${dig}の付く日`); });
  if(shop.zorome && (d===11||d===22)) r.push("ゾロ目日");
  if(shop.monthDayZorome && m===d && m<=12) r.push("月日ゾロ目");
  shop.specificDays.forEach(sd => { if(d===sd) r.push(`毎月${sd}日`); });
  if(shop.saturday && dow===6) r.push("土曜日");
  if(shop.anniversary && shop.anniversary.month===m && shop.anniversary.day===d) r.push("🎂周年");
  return r;
}
const hasEvent = (shop,date) => getReasons(shop,date).length>0;
const formatDate = (d) => `${d.getMonth()+1}/${d.getDate()}（${DAYS_JP[d.getDay()]}）`;
const toKey = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const parseKey = (k) => { const [y,m,d]=k.split("-").map(Number); return new Date(y,m-1,d); };
function patternText(s){
  const p=[];
  if(s.digitDays.length) p.push(s.digitDays.map(d=>`${d}の付く日`).join("・"));
  if(s.zorome) p.push("ゾロ目日"); if(s.monthDayZorome) p.push("月日ゾロ目");
  if(s.specificDays.length) p.push(s.specificDays.map(d=>`毎月${d}日`).join("・"));
  if(s.saturday) p.push("土曜日");
  if(s.anniversary) p.push(`周年${s.anniversary.month}/${s.anniversary.day}`);
  return p.join(" / ")||"パターンなし";
}
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const sameDay=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();

// ─── 出玉結果の照合 ───
const normName = (s) => (s||"").replace(/[店！!\/／\s　新]/g,"");
function fmtMai(n){ if(n===null||n===undefined) return "-"; return (n>0?"+":"")+Math.round(n).toLocaleString(); }
function diffColor(n){ return n>0?"text-emerald-400":(n<0?"text-rose-400":"text-gray-500"); }

// ─── 出玉結果モーダル ───
function ResultModal({ report, onClose }) {
  if(!report) return null;
  const s = report.summary||{};
  const kc = report.kishu_class||{excellent:[],highwin:[],others:[]};
  const mt = report.matsubi||[];
  const MLine = ({m}) => (
    <div className="flex justify-between gap-2 py-1.5 border-b border-dashed border-ink-700 last:border-0 text-sm">
      <span className="flex-1 min-w-0">{m.name}</span>
      <span className={`shrink-0 tabular-nums ${diffColor(m.avg_diff)}`}>{m.win_plus!=null?`${m.win_plus}/${m.win_total}台 `:""}平均{fmtMai(m.avg_diff)}</span>
    </div>
  );
  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-end sm:items-center justify-center" onClick={onClose}>
      <div className="bg-ink-850 w-full maxw max-h-[92vh] overflow-y-auto rounded-t-2xl sm:rounded-2xl" onClick={e=>e.stopPropagation()}>
        <div className="sticky top-0 bg-tiffany-500/100 text-ink-900 px-4 py-3 flex items-center justify-between">
          <div>
            <div className="font-bold">{report.store}</div>
            <div className="text-xs text-ink-900 opacity-90">{report.area} ・ {(report.title&&report.title.match(/\d+\/\d+\([月火水木金土日]\)/)||[report.date])[0]}{report.stale?"（旧データ）":""}</div>
          </div>
          <button onClick={onClose} className="w-9 h-9 rounded-lg bg-ink-800/20 text-white text-lg">✕</button>
        </div>
        <div className="p-3 space-y-3">
          {/* 総合集計 */}
          <div className="bg-ink-800 rounded-xl border border-ink-700 p-3">
            <h3 className="text-xs font-bold tracking-wider text-gray-500 mb-2">総合集計</h3>
            <table className="w-full text-sm">
              <tbody>
                <tr className="border-b border-ink-700"><td className="py-1.5">対象台数</td><td className="py-1.5 text-right font-bold">{s.total_units!=null?s.total_units+"台":"-"}</td></tr>
                <tr className="border-b border-ink-700"><td className="py-1.5">合計差枚{s.estimated?<span className="text-xs text-gray-500 font-normal">（推定）</span>:""}</td><td className={`py-1.5 text-right font-bold tabular-nums ${diffColor(s.total_diff)}`}>{fmtMai(s.total_diff)}枚</td></tr>
                <tr className="border-b border-ink-700"><td className="py-1.5">平均差枚</td><td className={`py-1.5 text-right font-bold tabular-nums ${diffColor(s.avg_diff)}`}>{fmtMai(s.avg_diff)}枚</td></tr>
                <tr><td className="py-1.5">勝率（プラス台）</td><td className="py-1.5 text-right font-bold">{s.win_plus!=null?`${s.win_plus}/${s.total_units} → ${s.win_pct}%`:"-"}</td></tr>
              </tbody>
            </table>
          </div>
          {/* 機種別内訳 */}
          <div className="bg-ink-800 rounded-xl border border-ink-700 p-3">
            <h3 className="text-xs font-bold tracking-wider text-gray-500 mb-2">機種別内訳</h3>
            {kc.excellent.length>0 && <div className="mb-2"><p className="text-sm font-bold text-tiffany-300 mb-1">■優秀機種候補</p>{kc.excellent.map((m,i)=><MLine key={i} m={m}/>)}</div>}
            {kc.highwin.length>0 && <div className="mb-2"><p className="text-sm font-bold text-tiffany-300 mb-1">■勝率高機種</p>{kc.highwin.map((m,i)=><MLine key={i} m={m}/>)}</div>}
            {kc.others.length>0 && <div><p className="text-sm font-bold text-tiffany-300 mb-1">■気になる台</p><p className="text-sm text-gray-400 leading-relaxed">{kc.others.map(m=>m.name).join("、")}</p></div>}
            {kc.excellent.length===0&&kc.highwin.length===0&&kc.others.length===0 && <p className="text-sm text-gray-500">プラスの機種は目立ちませんでした。</p>}
          </div>
          {/* 末尾別 */}
          <div className="bg-ink-800 rounded-xl border border-ink-700 p-3">
            <h3 className="text-xs font-bold tracking-wider text-gray-500 mb-2">末尾別</h3>
            <table className="w-full text-sm tabular-nums">
              <thead><tr className="text-xs text-gray-500"><th className="text-left font-semibold py-1">末尾</th><th className="text-right font-semibold py-1">平均差枚</th><th className="text-right font-semibold py-1">勝率</th><th className="text-right font-semibold py-1">出率</th></tr></thead>
              <tbody>
                {mt.map((m,i)=>{const zoro=/ゾロ/.test(m.matsubi); return (
                  <tr key={i} className={`border-t border-ink-700 ${zoro?"bg-tiffany-500/10 font-bold":""}`}>
                    <td className="text-left py-1.5">{zoro?"ゾロ目":"末尾"+m.matsubi}</td>
                    <td className={`text-right py-1.5 ${diffColor(m.avg_diff)}`}>{fmtMai(m.avg_diff)}</td>
                    <td className="text-right py-1.5">{m.win_plus!=null?`${m.win_plus}/${m.win_total}`:"-"}</td>
                    <td className="text-right py-1.5">{m.rate!=null?m.rate+"%":"-"}</td>
                  </tr>
                );})}
              </tbody>
            </table>
          </div>
          {/* まとめ */}
          <div className="bg-ink-800 rounded-xl border border-ink-700 p-3">
            <h3 className="text-xs font-bold tracking-wider text-gray-500 mb-2">まとめ</h3>

            <a href={report.url} target="_blank" rel="noopener" className="inline-block mt-2 text-sm text-tiffany-300">元データ(min-repo)を見る →</a>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── 店舗カード ───
function ShopCard({ shop, date, onDelete, compact, memos, onAddMemo, onDeleteMemo, allShopMemos, result, onShowResult }) {
  const [expanded, setExpanded] = useState(false);
  const [memoText, setMemoText] = useState("");
  const reasons = date ? getReasons(shop, date) : [];
  const style = AREA_STYLES[shop.area] || AREA_STYLES["湘南台・他"];
  const isAnniv = reasons.some(r => r.includes("周年"));
  const dayMemos = date ? (memos||[]).filter(m => m.shopId===shop.id && m.date===toKey(date)) : [];
  const shopMemoCount = allShopMemos ? allShopMemos.filter(m => m.shopId===shop.id).length : 0;
  const handleSave = () => { if(!memoText.trim()||!date) return; onAddMemo({id:`m${Date.now()}`,shopId:shop.id,date:toKey(date),text:memoText.trim(),createdAt:new Date().toISOString()}); setMemoText(""); };

  return (
    <div className={`rounded-xl border ${style.border} ${isAnniv?"ring-2 ring-amber-400":""} ${style.bg} p-3 mb-2`}>
      <div className="flex items-start justify-between gap-2">
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-bold text-white text-sm">{shop.name}</span>
            <span className={`text-xs px-1.5 py-0.5 rounded-full ${style.badge}`}>{shop.area}</span>
          </div>
          {!compact && reasons.length>0 && (
            <div className="flex flex-wrap gap-1 mt-1.5">
              {reasons.map((r,i) => <span key={i} className={`text-xs px-2 py-0.5 rounded-full ${r.includes("周年")?"bg-amber-500/25 text-amber-200 font-bold":"bg-ink-800 text-gray-300 border border-ink-700"}`}>{r}</span>)}
            </div>
          )}
          {compact && <p className="text-xs text-gray-400 mt-0.5">{patternText(shop)}</p>}
          {compact && shopMemoCount>0 && <p className="text-xs text-gray-500 mt-0.5">メモ {shopMemoCount}件</p>}
          {result && (
            <button onClick={()=>onShowResult(result)} className="mt-2 inline-flex items-center gap-1.5 text-xs font-bold px-2.5 py-1.5 rounded-lg bg-tiffany-500/100 text-ink-900">
              📊 出玉結果 {result.summary&&result.summary.total_diff!=null?<span className={result.summary.total_diff>0?"text-white":"text-ink-900"}>{fmtMai(result.summary.total_diff)}枚</span>:""}
            </button>
          )}
        </div>
        <div className="flex gap-1 items-center shrink-0">
          {date && onAddMemo && (
            <button onClick={()=>setExpanded(!expanded)} className={`w-8 h-8 flex items-center justify-center rounded-lg border text-sm transition-colors ${expanded?"bg-tiffany-500/100 text-ink-900 border-tiffany-500":dayMemos.length>0?"bg-amber-500/20 text-amber-300 border-amber-500/40":"bg-ink-800 text-gray-500 border-ink-700"}`}>
              {dayMemos.length>0?dayMemos.length:"✎"}
            </button>
          )}
          {shop.url && <a href={shop.url} target="_blank" rel="noopener noreferrer" className="w-8 h-8 flex items-center justify-center rounded-lg bg-ink-800 border border-ink-700 text-gray-400 hover:text-tiffany-300 text-sm">↗</a>}
          {onDelete && <button onClick={()=>onDelete(shop.id)} className="w-8 h-8 flex items-center justify-center rounded-lg bg-ink-800 border border-ink-700 text-gray-500 hover:text-rose-500 text-sm">✕</button>}
        </div>
      </div>
      {expanded && date && (
        <div className="mt-2 pt-2 border-t border-ink-700 border-opacity-50">
          {dayMemos.map(memo => (
            <div key={memo.id} className="flex items-start gap-2 mb-1.5">
              <p className="flex-1 text-xs text-gray-200 bg-ink-800 rounded-lg px-2.5 py-1.5 border border-ink-700">{memo.text}</p>
              <button onClick={()=>onDeleteMemo(memo.id)} className="text-gray-600 hover:text-rose-400 text-xs mt-1 shrink-0">✕</button>
            </div>
          ))}
          <div className="flex gap-1.5 mt-1">
            <input value={memoText} onChange={e=>setMemoText(e.target.value)} placeholder="メモを書く..." onKeyDown={e=>{if(e.key==="Enter")handleSave();}}
              className="flex-1 px-2.5 py-1.5 rounded-lg border border-ink-600 text-xs bg-ink-800 focus:outline-none focus:ring-2 focus:ring-tiffany-500" />
            <button onClick={handleSave} disabled={!memoText.trim()} className="px-3 py-1.5 bg-tiffany-500/100 text-ink-900 text-xs font-bold rounded-lg disabled:opacity-30 shrink-0">保存</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── 今日ビュー ───
function TodayView({ shops, today, memos, onAddMemo, onDeleteMemo, getResult, onShowResult }) {
  const days = useMemo(() => {
    const result=[];
    for(let i=0;i<14;i++){
      const date=addDays(today,i);
      const matched=shops.filter(s=>hasEvent(s,date)).sort((a,b)=>AREAS.indexOf(a.area)-AREAS.indexOf(b.area));
      if(matched.length>0) result.push({date, shops:matched});
    }
    return result;
  }, [shops, today]);

  return (
    <div className="pb-4">
      {days.length===0 && <p className="text-center text-gray-500 py-12">2週間以内にイベントなし</p>}
      {days.map(({date, shops:ds}, idx) => {
        const isToday=sameDay(date,today), isTom=sameDay(date,addDays(today,1));
        let label=formatDate(date); if(isToday) label=`今日  ${label}`; else if(isTom) label=`明日  ${label}`;
        const isSun=date.getDay()===0, isSat=date.getDay()===6;
        return (
          <div key={idx} className="mb-5">
            <div className="flex items-center gap-2 mb-2 px-1">
              <h2 className={`text-lg font-black ${isToday?"text-tiffany-400":isSun?"text-rose-500":isSat?"text-sky-500":"text-gray-100"}`}>{label}</h2>
              <span className="bg-tiffany-500/100 text-ink-900 text-xs font-bold px-2 py-0.5 rounded-full">{ds.length}件</span>
            </div>
            {ds.map(shop => <ShopCard key={shop.id} shop={shop} date={date} memos={memos} onAddMemo={onAddMemo} onDeleteMemo={onDeleteMemo} result={getResult(shop,date)} onShowResult={onShowResult} />)}
          </div>
        );
      })}
    </div>
  );
}

// ─── 暦ビュー ───
function CalendarView({ shops, today, memos, onAddMemo, onDeleteMemo, getResult, onShowResult }) {
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [selectedDate, setSelectedDate] = useState(null);

  const calendarDays = useMemo(() => {
    const first=new Date(viewYear,viewMonth,1), startDay=first.getDay(), dim=new Date(viewYear,viewMonth+1,0).getDate();
    const cells=[]; for(let i=0;i<startDay;i++) cells.push(null); for(let d=1;d<=dim;d++) cells.push(new Date(viewYear,viewMonth,d));
    return cells;
  }, [viewYear, viewMonth]);

  const dayData = useMemo(() => {
    const map={};
    calendarDays.forEach(date => { if(!date) return; const d=date.getDate(), dk=toKey(date);
      map[d] = { events: shops.filter(s=>hasEvent(s,date)).length, memos: memos.filter(m=>m.date===dk).length }; });
    return map;
  }, [calendarDays, shops, memos]);

  const prevMonth = () => { if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); setSelectedDate(null); };
  const nextMonth = () => { if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); setSelectedDate(null); };

  const selShops = useMemo(() => selectedDate ? shops.filter(s=>hasEvent(s,selectedDate)).sort((a,b)=>AREAS.indexOf(a.area)-AREAS.indexOf(b.area)) : [], [selectedDate, shops]);

  return (
    <div className="pb-4">
      <div className="flex items-center justify-between mb-3 px-1">
        <button onClick={prevMonth} className="w-10 h-10 flex items-center justify-center rounded-xl bg-ink-700 text-gray-300 font-bold text-lg">‹</button>
        <h2 className="text-lg font-black text-gray-100">{viewYear}年{viewMonth+1}月</h2>
        <button onClick={nextMonth} className="w-10 h-10 flex items-center justify-center rounded-xl bg-ink-700 text-gray-300 font-bold text-lg">›</button>
      </div>
      <div className="grid grid-cols-7 mb-1">
        {DAYS_JP.map((d,i) => <div key={d} className={`text-center text-xs font-bold py-1 ${i===0?"text-rose-400":i===6?"text-sky-400":"text-gray-500"}`}>{d}</div>)}
      </div>
      <div className="grid grid-cols-7 gap-px bg-ink-700 rounded-xl overflow-hidden border border-ink-700">
        {calendarDays.map((date,i) => {
          if(!date) return <div key={`e${i}`} className="bg-ink-800 h-12" />;
          const d=date.getDate(), dd=dayData[d]||{events:0,memos:0};
          const isT=sameDay(date,today), isSel=selectedDate&&sameDay(date,selectedDate);
          const isSun=date.getDay()===0, isSat=date.getDay()===6;
          return (
            <button key={i} onClick={()=>setSelectedDate(date)}
              className={`bg-ink-800 h-12 flex flex-col items-center justify-center relative transition-colors ${isSel?"ring-2 ring-tiffany-500 ring-inset bg-tiffany-500/10":isT?"bg-tiffany-500/10":""}`}>
              <span className={`text-sm font-bold leading-none ${isT?"text-tiffany-400":isSun?"text-rose-500":isSat?"text-sky-500":"text-gray-200"}`}>{d}</span>
              <div className="flex gap-0.5 mt-0.5 items-center">
                {dd.events>0 && dd.events<=3 && Array.from({length:dd.events}).map((_,j)=><div key={j} className="w-1 h-1 rounded-full bg-tiffany-500/100" />)}
                {dd.events>3 && <span className="text-tiffany-300 text-xs font-bold leading-none">{dd.events}</span>}
                {dd.memos>0 && <div className="w-1.5 h-1.5 rounded-full bg-amber-400" />}
              </div>
            </button>
          );
        })}
      </div>
      {selectedDate && (
        <div className="mt-4">
          <h3 className="text-base font-bold text-gray-100 mb-2 px-1">{formatDate(selectedDate)}
            <span className="ml-2 text-sm font-normal text-gray-400">{selShops.length}件</span>
          </h3>
          {selShops.length===0 && <p className="text-sm text-gray-500 px-1">この日のイベントなし</p>}
          {selShops.map(shop => <ShopCard key={shop.id} shop={shop} date={selectedDate} memos={memos} onAddMemo={onAddMemo} onDeleteMemo={onDeleteMemo} result={getResult(shop,selectedDate)} onShowResult={onShowResult} />)}
        </div>
      )}
    </div>
  );
}

// ─── メモビュー ───
function MemoView({ shops, memos, onDeleteMemo }) {
  const [filterShop, setFilterShop] = useState(null);
  const shopMap = useMemo(()=>{ const m={}; shops.forEach(s=>{m[s.id]=s;}); return m; }, [shops]);
  const shopsWithMemos = useMemo(()=>[...new Set(memos.map(m=>m.shopId))].map(id=>shopMap[id]).filter(Boolean), [memos,shopMap]);
  const filtered = useMemo(()=>{let l=[...memos]; if(filterShop) l=l.filter(m=>m.shopId===filterShop); l.sort((a,b)=>b.date.localeCompare(a.date)||b.createdAt.localeCompare(a.createdAt)); return l;}, [memos,filterShop]);
  const grouped = useMemo(()=>{const g=[]; let cd=null; filtered.forEach(m=>{if(m.date!==cd){cd=m.date;g.push({date:m.date,memos:[]});}g[g.length-1].memos.push(m);}); return g;}, [filtered]);

  if(memos.length===0) return <div className="py-16 text-center"><p className="text-3xl mb-3">✎</p><p className="text-gray-400 text-sm font-bold">メモなし</p><p className="text-gray-500 text-xs mt-1">店舗カードの ✎ からメモ追加</p></div>;

  return (
    <div className="pb-4">
      {shopsWithMemos.length>1 && (
        <div className="flex flex-wrap gap-1.5 mb-3">
          <button onClick={()=>setFilterShop(null)} className={`px-3 py-1 rounded-full text-xs font-bold border transition-colors ${!filterShop?"bg-tiffany-500/100 text-ink-900 border-tiffany-500":"bg-ink-800 text-gray-300 border-ink-600"}`}>すべて</button>
          {shopsWithMemos.map(s=><button key={s.id} onClick={()=>setFilterShop(s.id)} className={`px-3 py-1 rounded-full text-xs font-bold border transition-colors ${filterShop===s.id?"bg-tiffany-500/100 text-ink-900 border-tiffany-500":"bg-ink-800 text-gray-300 border-ink-600"}`}>{s.name.length>8?s.name.slice(0,8)+"…":s.name}</button>)}
        </div>
      )}
      {grouped.map(g=>{const date=parseKey(g.date); return (
        <div key={g.date} className="mb-4">
          <h3 className="text-sm font-bold text-gray-400 mb-1.5 px-1">{formatDate(date)}</h3>
          {g.memos.map(memo=>{const shop=shopMap[memo.shopId]; const as=shop?(AREA_STYLES[shop.area]||AREA_STYLES["湘南台・他"]):{bg:"bg-ink-850",border:"border-ink-700",badge:"bg-ink-700 text-gray-300"}; return (
            <div key={memo.id} className={`${as.bg} border ${as.border} rounded-xl p-3 mb-2`}>
              <div className="flex items-start justify-between gap-2">
                <div className="min-w-0 flex-1">
                  <div className="flex items-center gap-2 mb-1"><span className="font-bold text-white text-sm">{shop?shop.name:"削除済み"}</span>{shop&&<span className={`text-xs px-1.5 py-0.5 rounded-full ${as.badge}`}>{shop.area}</span>}</div>
                  <p className="text-sm text-gray-200">{memo.text}</p>
                </div>
                <button onClick={()=>onDeleteMemo(memo.id)} className="text-gray-600 hover:text-rose-400 text-sm shrink-0 mt-0.5">✕</button>
              </div>
            </div>
          );})}
        </div>
      );})}
    </div>
  );
}

// ─── 店舗リスト ───
function ShopList({ shops, onDelete, onAdd, memos }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({name:"",area:"立川",digitDays:[],zorome:false,monthDayZorome:false,specificDays:"",saturday:false,annMonth:"",annDay:"",url:""});
  const toggleDigit=(d)=>setForm(f=>({...f,digitDays:f.digitDays.includes(d)?f.digitDays.filter(x=>x!==d):[...f.digitDays,d].sort()}));
  const handleSubmit=()=>{if(!form.name.trim())return; const shop={id:`s${Date.now()}`,name:form.name.trim(),area:form.area,digitDays:form.digitDays,zorome:form.zorome,monthDayZorome:form.monthDayZorome,specificDays:form.specificDays?form.specificDays.split(",").map(Number).filter(n=>n>0&&n<=31):[],saturday:form.saturday,anniversary:form.annMonth&&form.annDay?{month:Number(form.annMonth),day:Number(form.annDay)}:null,url:form.url.trim()||null}; onAdd(shop); setForm({name:"",area:"立川",digitDays:[],zorome:false,monthDayZorome:false,specificDays:"",saturday:false,annMonth:"",annDay:"",url:""}); setShowForm(false);};
  const grouped=AREAS.map(a=>({area:a,shops:shops.filter(s=>s.area===a)})).filter(g=>g.shops.length>0);

  return (
    <div className="pb-4">
      {grouped.map(({area,shops:as})=>(
        <div key={area} className="mb-4">
          <h3 className="text-sm font-bold text-gray-400 mb-1.5 px-1">{area}（{as.length}）</h3>
          {as.map(shop=><ShopCard key={shop.id} shop={shop} onDelete={onDelete} compact allShopMemos={memos} />)}
        </div>
      ))}
      {!showForm ? (
        <button onClick={()=>setShowForm(true)} className="w-full py-3 rounded-xl border-2 border-dashed border-ink-600 text-gray-400 font-bold text-sm hover:border-tiffany-500 hover:text-tiffany-300 transition-colors">＋ 店舗を追加</button>
      ) : (
        <div className="bg-ink-800 border border-ink-700 rounded-xl p-4 space-y-3">
          <h3 className="font-bold text-gray-100 text-sm">店舗追加</h3>
          <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="店舗名" className="w-full px-3 py-2 rounded-lg border border-ink-600 text-sm focus:outline-none focus:ring-2 focus:ring-tiffany-500" />
          <div><label className="text-xs font-bold text-gray-400 block mb-1">エリア</label><div className="flex flex-wrap gap-1.5">{AREAS.map(a=><button key={a} onClick={()=>setForm(f=>({...f,area:a}))} className={`px-3 py-1 rounded-full text-xs font-bold border transition-colors ${form.area===a?"bg-tiffany-500/100 text-ink-900 border-tiffany-500":"bg-ink-800 text-gray-300 border-ink-600"}`}>{a}</button>)}</div></div>
          <div><label className="text-xs font-bold text-gray-400 block mb-1">Xの付く日</label><div className="flex gap-1.5">{[1,2,3,4,5,6,7,8,9].map(d=><button key={d} onClick={()=>toggleDigit(d)} className={`w-8 h-8 rounded-lg text-sm font-bold border transition-colors ${form.digitDays.includes(d)?"bg-tiffany-500/100 text-ink-900 border-tiffany-500":"bg-ink-800 text-gray-300 border-ink-600"}`}>{d}</button>)}</div></div>
          <div className="flex flex-wrap gap-2">{[{key:"zorome",label:"ゾロ目日"},{key:"monthDayZorome",label:"月日ゾロ目"},{key:"saturday",label:"土曜日"}].map(({key,label})=><button key={key} onClick={()=>setForm(f=>({...f,[key]:!f[key]}))} className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-colors ${form[key]?"bg-tiffany-500/100 text-ink-900 border-tiffany-500":"bg-ink-800 text-gray-300 border-ink-600"}`}>{label}</button>)}</div>
          <input value={form.specificDays} onChange={e=>setForm(f=>({...f,specificDays:e.target.value}))} placeholder="毎月X日（カンマ区切り）" className="w-full px-3 py-2 rounded-lg border border-ink-600 text-sm focus:outline-none focus:ring-2 focus:ring-tiffany-500" />
          <div className="flex gap-2 items-center"><span className="text-xs text-gray-400 shrink-0">周年</span><input value={form.annMonth} onChange={e=>setForm(f=>({...f,annMonth:e.target.value}))} placeholder="月" type="number" min="1" max="12" className="w-16 px-2 py-2 rounded-lg border border-ink-600 text-sm focus:outline-none focus:ring-2 focus:ring-tiffany-500" /><span className="text-xs text-gray-500">/</span><input value={form.annDay} onChange={e=>setForm(f=>({...f,annDay:e.target.value}))} placeholder="日" type="number" min="1" max="31" className="w-16 px-2 py-2 rounded-lg border border-ink-600 text-sm focus:outline-none focus:ring-2 focus:ring-tiffany-500" /></div>
          <input value={form.url} onChange={e=>setForm(f=>({...f,url:e.target.value}))} placeholder="P-World URL（任意）" className="w-full px-3 py-2 rounded-lg border border-ink-600 text-sm focus:outline-none focus:ring-2 focus:ring-tiffany-500" />
          <div className="flex gap-2"><button onClick={handleSubmit} className="flex-1 py-2.5 bg-tiffany-500/100 text-ink-900 font-bold tf-btn-glow text-sm rounded-xl hover:bg-tiffany-400 transition-colors">追加</button><button onClick={()=>setShowForm(false)} className="px-4 py-2.5 bg-ink-700 text-gray-300 font-bold text-sm rounded-xl">閉じる</button></div>
        </div>
      )}
    </div>
  );
}

// ─── メイン ───
function App() {
  const [shops, setShops] = useState(null);
  const [memos, setMemos] = useState([]);
  const [tab, setTab] = useState("today");
  const today = useMemo(() => new Date(), []);
  const [loading, setLoading] = useState(true);
  const [storageStatus, setStorageStatus] = useState("");
  const [reports, setReports] = useState([]);
  const [reportMeta, setReportMeta] = useState(null);
  const [resultReport, setResultReport] = useState(null);

  useEffect(() => {
    (async () => {
      let ls=null, lm=[]; let status=[];
      try { const r=await storage.get(SHOPS_KEY); if(r?.value){const p=JSON.parse(r.value); if(Array.isArray(p)&&p.length>0){ls=p;status.push("店舗"+p.length);}} } catch(e){}
      try { const r=await storage.get(MEMOS_KEY); if(r?.value){const p=JSON.parse(r.value); if(Array.isArray(p)){lm=p; if(p.length>0) status.push("メモ"+p.length);}} } catch(e){}
      if(!ls){ ls=DEFAULT_SHOPS; try{await storage.set(SHOPS_KEY,JSON.stringify(DEFAULT_SHOPS));}catch(e){} status.push("店舗:デフォルト"+DEFAULT_SHOPS.length); }
      setShops(ls); setMemos(lm); setLoading(false);
      setStorageStatus(status.join(" / ")||"データなし");
    })();
    // 出玉結果を読み込み
    fetch("./data/reports.json",{cache:"no-store"}).then(r=>r.ok?r.json():null).then(j=>{
      if(j){ setReports(j.reports||[]); setReportMeta(j.generated_at); }
    }).catch(()=>{});
  }, []);

  const reportIndex = useMemo(() => {
    const idx={}; reports.forEach(r=>{ if(r.iso_date) idx[normName(r.store)+"|"+r.iso_date]=r; }); return idx;
  }, [reports]);

  const getResult = useCallback((shop, date) => {
    if(!date || !reports.length) return null;
    const iso=toKey(date), sk=normName(shop.name);
    if(reportIndex[sk+"|"+iso]) return reportIndex[sk+"|"+iso];
    for(const r of reports){ if(r.iso_date===iso){ const rk=normName(r.store); if(rk.includes(sk.slice(0,3))||sk.includes(rk.slice(0,3))) return r; } }
    return null;
  }, [reports, reportIndex]);

  const saveShops = useCallback(async(s)=>{setShops(s);try{await storage.set(SHOPS_KEY,JSON.stringify(s));}catch(e){}}, []);
  const saveMemos = useCallback(async(m)=>{setMemos(m);try{await storage.set(MEMOS_KEY,JSON.stringify(m));}catch(e){}}, []);
  const handleDeleteShop = useCallback((id)=>{if(shops) saveShops(shops.filter(s=>s.id!==id));}, [shops,saveShops]);
  const handleAddShop = useCallback((shop)=>{if(shops) saveShops([...shops,shop]);}, [shops,saveShops]);
  const handleAddMemo = useCallback((memo)=>{saveMemos([...memos,memo]);}, [memos,saveMemos]);
  const handleDeleteMemo = useCallback((id)=>{saveMemos(memos.filter(m=>m.id!==id));}, [memos,saveMemos]);
  const handleReset = useCallback(async()=>{saveShops(DEFAULT_SHOPS);}, [saveShops]);

  if(loading||!shops) return <div className="min-h-screen flex items-center justify-center"><div className="text-gray-500 text-sm">読み込み中...</div></div>;

  const todayEvents = shops.filter(s=>hasEvent(s,today));
  const tabs = [{id:"today",label:"今日"},{id:"calendar",label:"暦"},{id:"memos",label:"メモ"},{id:"shops",label:"店舗"}];

  return (
    <div className="min-h-screen">
      <div className="maxw">
        <div className="bg-ink-800 border-b border-ink-700 px-4 pt-3 pb-2" style={{boxShadow:"inset 0 3px 0 #4DD9CB"}}>
          <div className="flex items-center justify-between mb-2">
            <div>
              <h1 className="text-xl text-white tracking-tight nori-glow nori-logo">のりレポ <span className="text-tiffany-400">東京・神奈川</span></h1>
              <p className="nori-credit">PRODUCED BY 異彩</p>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="text-xs text-gray-500">{formatDate(today)}</span>
              {todayEvents.length>0 && <span className="bg-tiffany-500/100 text-ink-900 text-xs font-bold px-2 py-0.5 rounded-full">{todayEvents.length}</span>}
            </div>
          </div>
          <div className="flex gap-0.5 bg-ink-700 rounded-xl p-1 mt-2">
            {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-colors ${tab===t.id?"bg-tiffany-500/100 text-ink-900 shadow tf-btn-glow":"text-gray-400"}`}>{t.label}</button>)}
          </div>
        </div>
        <div className="px-4 pt-3">
          {tab==="today" && <TodayView shops={shops} today={today} memos={memos} onAddMemo={handleAddMemo} onDeleteMemo={handleDeleteMemo} getResult={getResult} onShowResult={setResultReport} />}
          {tab==="calendar" && <CalendarView shops={shops} today={today} memos={memos} onAddMemo={handleAddMemo} onDeleteMemo={handleDeleteMemo} getResult={getResult} onShowResult={setResultReport} />}
          {tab==="memos" && <MemoView shops={shops} memos={memos} onDeleteMemo={handleDeleteMemo} />}
          {tab==="shops" && <ShopList shops={shops} onDelete={handleDeleteShop} onAdd={handleAddShop} memos={memos} />}
        </div>
      </div>
      <ResultModal report={resultReport} onClose={()=>setResultReport(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
  // classic runtime(React.createElement)で変換。automatic だと import 文が出て動かないため。
  (function(){
    function boot(){
      try{
        var src=document.getElementById("appsrc").textContent;
        var out=Babel.transform(src,{presets:[["react",{runtime:"classic"}]]}).code;
        (0,eval)(out);
      }catch(e){
        document.getElementById("root").innerHTML='<div style="padding:24px;color:#b23b3b;font-family:sans-serif">読み込みエラー: '+e.message+'</div>';
        console.error(e);
      }
    }
    if(document.readyState!=="loading") boot(); else document.addEventListener("DOMContentLoaded",boot);
  })();
</script>
</body>
</html>
